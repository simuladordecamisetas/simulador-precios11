<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador PRO</title>

<style>
body{
font-family:'Segoe UI', Arial;
margin:0;
padding:20px;
position:relative;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
url("https://i.pinimg.com/736x/4e/53/df/4e53df7fbfe0a967661bbd9d46393994.jpg") center/cover no-repeat;
z-index:-1;
}
.container{
max-width:1200px;
margin:auto;
background:rgba(255,255,255,0.9);
padding:25px;
border-radius:16px;
backdrop-filter:blur(10px);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

select,input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-agregar{background:#2563eb;color:white;}
.btn-vaciar{background:#ef4444;color:white;}

.card{
background:#f1f5f9;
padding:15px;
border-radius:10px;
}

li{
background:white;
margin:6px 0;
padding:10px;
border-radius:8px;
list-style:none;
}

.total{
margin-top:10px;
font-size:18px;
font-weight:bold;
background:#e0f2fe;
padding:10px;
border-radius:8px;
}

.detalle{
font-size:14px;
margin-top:10px;
background:#f8fafc;
padding:10px;
border-radius:8px;
}
</style>

</head>

<body>

<div class="container">
<h2>Simulador PRO</h2>

<div class="grid">

<div class="card">
<select id="pais" onchange="init()">
<option value="arg">Argentina</option>
<option value="col">Colombia</option>
<option value="per">Perú</option>
<option value="otro">Otro</option>
</select>

<select id="vendedor" onchange="cargarTodo()"></select>
<select id="producto"></select>

<input type="number" id="cantidad" value="1" min="1">

<div id="extras"></div>

<button class="btn-agregar" onclick="agregar()">Agregar</button>
</div>

<div class="card">
<h3>Carrito</h3>
<ul id="carrito"></ul>

<button class="btn-vaciar" onclick="vaciar()">Vaciar</button>

<div class="total" id="total"></div>
<div class="detalle" id="detalle"></div>
</div>

</div>
</div>

<script>

// nombres
let nombres={
fan:"Fan",
playerAdidas:"Player Adidas",
playerNike:"Player Nike",
retro:"Retro",
nba:"NBA",
nfl:"NFL",
kit:"Kit",
jacket:"Jacket",
pants:"Pants"
};

// vendedores completos
let vendedores={

king:{
disp:["col","per","otro"],
prod:{otro:{fan:11,playerAdidas:14,playerNike:15,retro:15,nba:20,kit:13}},
ext:{parche:1,personalizacion:3,talle2XL:1},
env:c=>c>=4?0:c==3?3:c==2?4:5
},

huang:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:14,playerNike:16,retro:16,kit:13}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:2,talle4XL:2},
env:c=>c>=4?0:c==3?2:c==2?3:4
},

meiou:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:13,playerNike:15,retro:15,nba:20,nfl:25}},
ext:{parche:1,personalizacion:3,talle3XL:1,talle4XL:2},
env:c=>c>=4?0:5
},

pinhui:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:13,playerNike:17,retro:17,nba:20,nfl:25}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:2,talle4XL:3},
env:c=>c>=5?0:5
},

annie:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:12,playerAdidas:18,playerNike:18,retro:18,nba:22}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:2,talle4XL:2},
env:c=>10
},

bond:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:14,playerNike:15,retro:16}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:1,talle4XL:1},
env:c=>c>=5?0:c>=2?5:7
},

jerry:{
disp:["col","per","otro"],
prod:{otro:{fan:11,playerNike:15,retro:16,nba:20}},
ext:{parche:1,personalizacion:3},
env:c=>c>=3?0:5
},

xiao:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:14,playerNike:16,retro:15,nba:22,nfl:25}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:2},
env:c=>c>=5?0:5
},

meiting:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:13,playerNike:15,retro:15,nba:20,nfl:25}},
ext:{parche:1,personalizacion:3,talle3XL:1,talle4XL:2},
env:c=>c>=4?0:5
},

mai:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:14,playerNike:15,retro:16,nba:20,nfl:23}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:1,talle4XL:1},
env:c=>c>=5?0:5
}

};

let carritos={};

function init(){
let pais=document.getElementById("pais").value;
let sel=document.getElementById("vendedor");
sel.innerHTML="";

for(let v in vendedores){
if(vendedores[v].disp.includes(pais)){
let op=document.createElement("option");
op.value=v;
op.textContent=v.toUpperCase();
sel.appendChild(op);
}}

cargarTodo();
}

function cargarTodo(){
let vendedor=document.getElementById("vendedor").value;
let v=vendedores[vendedor];

let prodSel=document.getElementById("producto");
prodSel.innerHTML="";

for(let p in v.prod.otro){
let op=document.createElement("option");
op.value=p;
op.textContent=nombres[p]+" ($"+v.prod.otro[p]+")";
prodSel.appendChild(op);
}

// extras dinámicos
let extras=document.getElementById("extras");
extras.innerHTML="<b>Extras:</b><br>";

let p=document.createElement("input");
p.type="number";
p.placeholder="Ej: 3";
p.id="parcheCantidad";
extras.append("Parches (+$"+v.ext.parche+" c/u): ");
extras.appendChild(p);
extras.appendChild(document.createElement("br"));

let t=document.createElement("input");
t.type="text";
t.placeholder="Ej: Messi 10";
t.id="personalizacionTexto";
extras.append("Personalización (+$"+v.ext.personalizacion+"): ");
extras.appendChild(t);
extras.appendChild(document.createElement("br"));

Object.keys(v.ext).forEach(e=>{
if(e.startsWith("talle")){
let c=document.createElement("input");
c.type="checkbox";
c.value=e;
extras.appendChild(c);
extras.append(" "+e.replace("talle","Talle ")+" (+$"+v.ext[e]+")");
extras.appendChild(document.createElement("br"));
}
});
}

function agregar(){
let vendedor=document.getElementById("vendedor").value;
let producto=document.getElementById("producto").value;
let cantidad=parseInt(document.getElementById("cantidad").value);

let v=vendedores[vendedor];
let base=v.prod.otro[producto];

let extrasTotal=0;
let partesExtras=[];

let p=parseInt(document.getElementById("parcheCantidad").value)||0;
if(p>0){
extrasTotal+=p*v.ext.parche;
partesExtras.push(`${p} parches ($${v.ext.parche} c/u)`);
}

let txt=document.getElementById("personalizacionTexto").value.trim();
if(txt!=""){
extrasTotal+=v.ext.personalizacion;
partesExtras.push(`${txt} ($${v.ext.personalizacion})`);
}

document.querySelectorAll("#extras input[type=checkbox]:checked").forEach(c=>{
extrasTotal+=v.ext[c.value];
partesExtras.push(`${c.value.replace("talle","Talle ")} ($${v.ext[c.value]})`);
});

let total=(base+extrasTotal)*cantidad;

if(!carritos[vendedor]) carritos[vendedor]=[];

carritos[vendedor].push({
producto,cantidad,total,base,extrasTotal,partesExtras
});

render();
calcular();
}

function render(){
let vendedor=document.getElementById("vendedor").value;
let ul=document.getElementById("carrito");
ul.innerHTML="";

(carritos[vendedor]||[]).forEach((item,i)=>{

let base=`${item.cantidad}x ${nombres[item.producto]} ($${item.base} c/u)`;
let extras=item.partesExtras.length?" + "+item.partesExtras.join(" + "):"";

let li=document.createElement("li");
li.innerHTML=`${base}${extras} = $${item.total}
<button onclick="eliminar(${i})">X</button>`;
ul.appendChild(li);
});
}

function eliminar(i){
let vendedor=document.getElementById("vendedor").value;
carritos[vendedor].splice(i,1);
render();calcular();
}

function vaciar(){
let vendedor=document.getElementById("vendedor").value;
carritos[vendedor]=[];
render();calcular();
}

function calcular(){
let vendedor=document.getElementById("vendedor").value;
let v=vendedores[vendedor];
let cart=carritos[vendedor]||[];

let items=cart.reduce((a,b)=>a+b.cantidad,0);
let subtotal=cart.reduce((a,b)=>a+b.total,0);
let envio=v.env(items);

document.getElementById("total").innerText="TOTAL: $"+(subtotal+envio);
document.getElementById("detalle").innerHTML=
`Productos: ${items}<br>Subtotal: $${subtotal}<br>Envío: $${envio}`;
}

init();

</script>

</body>
</html>
