<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador PRO</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2,h3{
  text-align:center;
}

select,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
}

button{
  background:#007bff;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#0056b3;
}

#carrito li{
  background:#eee;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
}

.btn-eliminar{
  float:right;
  background:red;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
  padding:3px 8px;
}

.total{
  font-size:22px;
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Simulador PRO</h2>

<label>País</label>
<select id="pais" onchange="init()">
<option value="arg">Argentina</option>
<option value="col">Colombia</option>
<option value="per">Perú</option>
<option value="otro">Otro</option>
</select>

<label>Vendedor</label>
<select id="vendedor" onchange="cargarTodo()"></select>

<label>Producto</label>
<select id="producto"></select>

<h3>Extras</h3>
<div id="extras"></div>

<button onclick="agregar()">Agregar al carrito</button>

<h3>Carrito</h3>
<ul id="carrito"></ul>

<button onclick="calcular()">Calcular total</button>

<div class="total" id="total"></div>

</div>

<script>

let vendedores = {

// KING
king:{
disp:["col","per","otro"],
prod:{otro:{
fan:11,playerAdidas:14,playerNike:15,retro:15,nba:20,
kitInfantil:13,shorts:9,medias:4
}},
ext:{parche:1,personalizacion:3,cuello:1,manga:1,talle2XL:1},
env:c=>c==1?5:c==2?4:c==3?3:0
},

// HUANG
huang:{
disp:["arg","col","per","otro"],
prod:{
arg:{
fan:13,playerAdidas:16,playerNike:18,retro:20,nba:22,
kitInfantil:13,shortsFan:11,shortsPlayer:15,medias:6,
entrenamiento:50,underArmour:30,kitCompleto:21,
jacketPants:40,pants:20
},
otro:{
fan:11,playerAdidas:14,playerNike:16,retro:16,nba:20,
kitInfantil:13,shortsFan:9,shortsPlayer:13,medias:5,
entrenamiento:35,underArmour:28,kitCompleto:19,
jacketPants:38,pants:18
}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:2,talle4XL:3},
env:c=>c==1?4:c==2?3:c==3?2:0
},

// MEI OU
meiou:{
disp:["arg","col","per","otro"],
prod:{otro:{
fan:11,playerAdidas:13,playerPuma:14,playerNike:15,
retro:15,nba:20,nfl:25,kitInfantil:13,
shortsFan:10,shortsPlayer:13,medias:8,
jacket:40,entrenamiento:35,rompevientos:32
}},
ext:{parche:1,personalizacion:3,manga:1,talle3XL:1,talle4XL:2},
env:c=>c<=2?10:c<=4?8:6
},

// PINHUI
pinhui:{
disp:["arg","col","per","otro"],
prod:{otro:{
fan:11,playerAdidas:13,playerPuma:15,playerNike:17,
retro:17,nba:20,nfl:25,kitInfantil:14,
shortsFan:10,shortsPlayer:15,medias:8,
entrenamiento:40,jacket:30,kitCompleto:20
}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:2,talle4XL:3},
env:c=>c>=5?0:5
},

// ANNIE
annie:{
disp:["arg","col","per","otro"],
prod:{
arg:{
fan:12,player:18,retro:18,nba:22,
kitInfantil:14,kitAdulto:22,shorts:12,manga:16
},
otro:{
fan:11,player:15,retro:16
}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:2,talle4XL:2},
env:c=>10
},

// BOND
bond:{
disp:["arg","col","per","otro"],
prod:{otro:{
fan:11,playerAdidas:14,playerNike:15,retro:16,
kitInfantil:13,shortsFan:8,shortsPlayer:12,
shortsRetro:13,medias:3,
entrenamiento:35,kitCompleto:19,
jacketPants:38,pants:18
}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:1,talle4XL:1},
env:c=>c==1?7:c<=4?5:0
},

// JERRY
jerry:{
disp:["col","per","otro"],
prod:{otro:{
fan:11,player:15,retro:16,nba:20,kitInfantil:13
}},
ext:{parche:1,personalizacion:3},
env:c=>c>=3?0:5
},

// XIAO LI
xiaoli:{
disp:["arg","col","per","otro"],
prod:{
arg:{
fan:13,playerAdidas:16,playerNike:17,retro:18,
nba:22,nfl:25,kitInfantil:15,kitAdulto:21,
shortsFan:10,shortsPlayer:14,shorts:16,
mediasNinos:3,mediasAdultos:4,
entrenamiento:37,jacket:30,pants:19,
jacketPants:42,jugadorEstrella:1
},
otro:{
fan:11,playerAdidas:14,playerNike:16,retro:15,nba:20
}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:1,talle4XL:1},
env:c=>c==2?11:c==3?9:c==4?7:0
},

// MEI TING
meiting:{
disp:["arg","col","per","otro"],
prod:{otro:{
fan:11,playerNike:15,retro:15,nba:20,nfl:25,
kitInfantil:13,shortsFan:10,shortsPlayer:13,
medias:8,jacket:40,entrenamiento:35
}},
ext:{parche:1,personalizacion:3,manga:1,talle3XL:1,talle4XL:2},
env:c=>c<=2?10:c<=4?8:6
},

// MAI
mai:{
disp:["arg","col","per","otro"],
prod:{otro:{
fan:11,playerAdidas:14,playerNike:15,retro:16,
nba:20,nfl:23,kitInfantil:13,kitAdulto:19,
shortsFan:8,shortsPlayer:12,shorts:14,
mediasNinos:2,mediasAdultos:3,
entrenamiento:35,jacket:28,pants:17,
jacketPants:38,jugadorEstrella:1
}},
ext:{parche:1,personalizacion:3,talle:1},
env:c=>5
}

};

let carritos = {};

function init(){
let pais=document.getElementById("pais").value;
let sel=document.getElementById("vendedor");
sel.innerHTML="";

for(let v in vendedores){
if(vendedores[v].disp.includes(pais)){
let op=document.createElement("option");
op.value=v;
op.textContent=v.toUpperCase();
sel.appendChild(op);
}}

cargarTodo();
}

function cargarTodo(){
let pais=document.getElementById("pais").value;
let vendedor=document.getElementById("vendedor").value;
let v=vendedores[vendedor];

let productos=v.prod[pais]||v.prod.otro;

let prodSel=document.getElementById("producto");
prodSel.innerHTML="";

for(let p in productos){
let op=document.createElement("option");
op.value=p;
op.textContent=p+" ($"+productos[p]+")";
prodSel.appendChild(op);
}

let extras=document.getElementById("extras");
extras.innerHTML="";

for(let e in v.ext){
let c=document.createElement("input");
c.type="checkbox";
c.value=e;

extras.appendChild(c);
extras.append(" "+e+" (+$"+v.ext[e]+")");
extras.appendChild(document.createElement("br"));
}

render();
}

function agregar(){

let pais=document.getElementById("pais").value;
let vendedor=document.getElementById("vendedor").value;
let producto=document.getElementById("producto").value;

if(!carritos[vendedor]) carritos[vendedor]=[];

let v=vendedores[vendedor];
let productos=v.prod[pais]||v.prod.otro;

let precio=productos[producto];

document.querySelectorAll("#extras input:checked").forEach(c=>{
precio+=v.ext[c.value];
});

carritos[vendedor].push(precio);

render();
}

function render(){
let vendedor=document.getElementById("vendedor").value;
let ul=document.getElementById("carrito");
ul.innerHTML="";

let cart=carritos[vendedor]||[];

cart.forEach((precio,index)=>{
let li=document.createElement("li");

li.innerHTML = `
$${precio} 
<button class="btn-eliminar" onclick="eliminar(${index})">X</button>
`;

ul.appendChild(li);
});
}

function eliminar(index){
let vendedor=document.getElementById("vendedor").value;
carritos[vendedor].splice(index,1);
render();
}

function calcular(){

let vendedor=document.getElementById("vendedor").value;
let v=vendedores[vendedor];

let cart=carritos[vendedor]||[];

let subtotal=cart.reduce((a,b)=>a+b,0);
let envio=v.env?v.env(cart.length):0;

document.getElementById("total").innerText =
"TOTAL: $" + (subtotal+envio) + " (envío $" + envio + ")";
}

init();

</script>

</body>
</html>
