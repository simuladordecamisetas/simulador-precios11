<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador PRO</title>

<style>
body{
font-family:'Segoe UI', Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
margin:0;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
text-align:center;
color:#0f172a;
margin-bottom:20px;
}

select,input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

.btn-agregar{background:#2563eb;color:white;}
.btn-vaciar{background:#ef4444;color:white;}

li{
list-style:none;
background:#f8fafc;
margin:8px 0;
padding:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.btn-eliminar{
float:right;
background:#ef4444;
color:white;
border:none;
border-radius:6px;
padding:5px 10px;
cursor:pointer;
}

.total{
font-size:22px;
text-align:center;
margin-top:20px;
font-weight:bold;
background:#e0f2fe;
padding:12px;
border-radius:10px;
}
</style>

</head>
<body>

<div class="container">

<h2>Simulador PRO</h2>

<select id="pais" onchange="init()">
<option value="arg">Argentina</option>
<option value="col">Colombia</option>
<option value="per">Perú</option>
<option value="otro">Otro</option>
</select>

<select id="vendedor" onchange="cargarTodo()"></select>

<select id="producto"></select>

<input type="number" id="cantidad" value="1" min="1">

<div id="extras"></div>

<button class="btn-agregar" onclick="agregar()">Agregar al carrito</button>

<h3>Carrito</h3>
<ul id="carrito"></ul>

<button class="btn-vaciar" onclick="vaciar()">Vaciar carrito</button>

<div class="total" id="total"></div>

</div>

<script>

let nombres={
fan:"Fan",playerNike:"Player Nike",playerAdidas:"Player Adidas",
retro:"Retro",nba:"NBA",nfl:"NFL",
shortsFan:"Short Fan",shortsPlayer:"Short Player",
medias:"Medias",kitInfantil:"Kit Infantil"
};

let vendedores={
pinhui:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:13,playerNike:17,retro:17,nba:20,nfl:25,kitInfantil:14,shortsFan:10,shortsPlayer:15,medias:8}},
ext:{parche:1,personalizacion:3},
env:c=>c>=5?0:5
}
};

let carritos={};

function init(){
let pais=document.getElementById("pais").value;
let sel=document.getElementById("vendedor");
sel.innerHTML="";

for(let v in vendedores){
if(vendedores[v].disp.includes(pais)){
let op=document.createElement("option");
op.value=v;
op.textContent=v.toUpperCase();
sel.appendChild(op);
}}

cargarTodo();
}

function cargarTodo(){
let pais=document.getElementById("pais").value;
let vendedor=document.getElementById("vendedor").value;
let v=vendedores[vendedor];

let productos=v.prod[pais]||v.prod.otro;

let prodSel=document.getElementById("producto");
prodSel.innerHTML="";

for(let p in productos){
let op=document.createElement("option");
op.value=p;
op.textContent=(nombres[p]||p)+" ($"+productos[p]+")";
prodSel.appendChild(op);
}

let extras=document.getElementById("extras");
extras.innerHTML="";

for(let e in v.ext){
let c=document.createElement("input");
c.type="checkbox";
c.value=e;

extras.appendChild(c);
extras.append(" "+e+" (+$"+v.ext[e]+")");
extras.appendChild(document.createElement("br"));
}

render();
}

function agregar(){
let pais=document.getElementById("pais").value;
let vendedor=document.getElementById("vendedor").value;
let producto=document.getElementById("producto").value;
let cantidad=parseInt(document.getElementById("cantidad").value)||1;

if(!carritos[vendedor]) carritos[vendedor]=[];

let v=vendedores[vendedor];
let productos=v.prod[pais]||v.prod.otro;

let base=productos[producto];
let extrasSel=[];
let extraTotal=0;

document.querySelectorAll("#extras input:checked").forEach(c=>{
extrasSel.push(c.value);
extraTotal+=v.ext[c.value];
});

let precio=(base+extraTotal)*cantidad;

carritos[vendedor].push({producto,extras:extrasSel,cantidad,precio});

render();
calcular();
}

function render(){
let vendedor=document.getElementById("vendedor").value;
let ul=document.getElementById("carrito");
ul.innerHTML="";

let cart=carritos[vendedor]||[];

cart.forEach((item,index)=>{
let nombre=nombres[item.producto]||item.producto;
let extras=item.extras.length?(" + "+item.extras.join(", ")):"";

let li=document.createElement("li");

li.innerHTML=`
${item.cantidad}x ${nombre}${extras} - $${item.precio}
<button class="btn-eliminar" onclick="eliminar(${index})">X</button>
`;

ul.appendChild(li);
});
}

function eliminar(index){
let vendedor=document.getElementById("vendedor").value;
carritos[vendedor].splice(index,1);
render();
calcular();
}

function vaciar(){
let vendedor=document.getElementById("vendedor").value;
carritos[vendedor]=[];
render();
calcular();
}

function calcular(){
let vendedor=document.getElementById("vendedor").value;
let v=vendedores[vendedor];

let cart=carritos[vendedor]||[];

let totalItems = cart.reduce((acc,item)=>acc + item.cantidad,0);
let subtotal=cart.reduce((a,b)=>a+b.precio,0);
let envio=v.env ? v.env(totalItems) : 0;

document.getElementById("total").innerText=
"TOTAL: $" + (subtotal+envio) + " ("+totalItems+" productos - envío $" + envio + ")";
}

init();

</script>

</body>
</html>
