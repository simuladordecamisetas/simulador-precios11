function verCatalogo(){

let vendedor=document.getElementById("vendedor").value;

// buscar links del vendedor
let links=[];
for(let key in catalogos){
if(key.startsWith(vendedor)){
links=links.concat(catalogos[key]);
}
}

if(!links.length){
alert("Este vendedor no tiene catálogo cargado");
return;
}

// nombres personalizados
let nombres = nombresCatalogos[vendedor] || [];

// SI TIENE VARIOS
if(links.length > 1){

let mensaje="Elegí catálogo:\n\n";

links.forEach((link,i)=>{

let nombre = nombres[i] || `Catálogo ${i+1}`;
mensaje += `${i+1} = ${nombre}\n`;

});

let opcion = prompt(mensaje);
let index = parseInt(opcion) - 1;

if(links[index]){
window.open(links[index],"_blank");
}else{
alert("Opción inválida");
}

return;
}

// SOLO UNO
window.open(links[0],"_blank");

}

function cargarTodo(){
let pais=document.getElementById("pais").value;
let vendedor=document.getElementById("vendedor").value;
let v=vendedores[vendedor];

let productos=v.prod[pais]||v.prod.otro;

let prodSel=document.getElementById("producto");
prodSel.innerHTML="";

for(let p in productos){
let op=document.createElement("option");
op.value=p;
op.textContent=nombres[p]+" ($"+productos[p]+")";
prodSel.appendChild(op);
}

let extras=document.getElementById("extras");
extras.innerHTML="<b>Extras:</b><br>";

// parches
extras.innerHTML+=`Parches (+$${v.ext.parche} c/u): <input id="parcheCantidad" type="number" min="0" placeholder="Ej: 3"><br>`;

// personalizacion
extras.innerHTML+=`Personalización (+$${v.ext.personalizacion}): <input id="personalizacionTexto" placeholder="Ej: Messi 10"><br>`;

// talles
["talle2XL","talle3XL","talle4XL"].forEach(e=>{
if(v.ext[e]){
extras.innerHTML+=`<label><input type="checkbox" value="${e}"> ${e.replace("talle","")} (+$${v.ext[e]})</label><br>`;
}
});

// ENVIO DINAMICO
let envioSelect=document.getElementById("tipoEnvio");

envioSelect.innerHTML=`<option value="normal">Normal</option>`;

if(v.ems){
envioSelect.innerHTML+=`<option value="ems">EMS (+$${v.ems})</option>`;
}

// recalcular cuando cambie
envioSelect.onchange=calcular;

render();
calcular();
generarInputsDeclaracion();
}

function agregar(){
let pais=document.getElementById("pais").value;
let vendedor=document.getElementById("vendedor").value;
let producto=document.getElementById("producto").value;
let cantidad=parseInt(document.getElementById("cantidad").value)||1;

if(!carritos[vendedor]) carritos[vendedor]=[];

let v=vendedores[vendedor];
let productos=v.prod[pais]||v.prod.otro;

let base=productos[producto];
let extraTotal=0;
let extrasSel=[];

// parches
let p=parseInt(document.getElementById("parcheCantidad").value)||0;
if(p){extraTotal+=p*v.ext.parche;extrasSel.push(p+" parches");}

// personalizacion
let txt=document.getElementById("personalizacionTexto").value.trim();
if(txt){extraTotal+=v.ext.personalizacion;extrasSel.push(txt);}

// talles
document.querySelectorAll("#extras input[type=checkbox]:checked").forEach(c=>{
extraTotal+=v.ext[c.value];
extrasSel.push(c.value.replace("talle",""));
});

let precio=(base+extraTotal)*cantidad;

carritos[vendedor].push({producto,cantidad,precio,extras:extrasSel});

render();
calcular();
generarInputsDeclaracion();
}

function render(){
let vendedor=document.getElementById("vendedor").value;
let ul=document.getElementById("carrito");
ul.innerHTML="";

(carritos[vendedor]||[]).forEach((item,i)=>{

let extrasTexto=item.extras.length?" + "+item.extras.join(" + "):"";

ul.innerHTML+=`
<li>${item.cantidad}x ${nombres[item.producto]}${extrasTexto} - $${item.precio}
<button class="btn-eliminar" onclick="eliminar(${i})">X</button></li>
`;
});
}

function eliminar(i){
let vendedor=document.getElementById("vendedor").value;
carritos[vendedor].splice(i,1);
render();
calcular();
generarInputsDeclaracion();
}
  
function vaciar(){
let vendedor=document.getElementById("vendedor").value;
carritos[vendedor]=[];
render();
calcular();
generarInputsDeclaracion();
}

function calcular(){
let vendedor=document.getElementById("vendedor").value;
let tipo=document.getElementById("tipoEnvio")?.value || "normal";

let v=vendedores[vendedor];
let cart=carritos[vendedor]||[];

let totalItems=cart.reduce((a,b)=>a+b.cantidad,0);
let subtotal=cart.reduce((a,b)=>a+b.precio,0);


// 🔥 ENVIO CORRECTO
let envio;

if(tipo==="ems" && v.ems){
envio=v.ems; // reemplaza el normal
}else{
envio=v.env(totalItems);
}

document.getElementById("total").innerText=
`Subtotal: $${subtotal}
Envío (${tipo==="ems"?"EMS":"Normal"}): $${envio}
TOTAL: $${subtotal+envio}`;
}

document.getElementById("tipoEnvio").addEventListener("change",calcular);

init();
renderHistorial();

function calcularDeclaracion(){

let vendedor = document.getElementById("vendedor").value;
let cart = carritos[vendedor] || [];

let envioVendedor = parseFloat(document.getElementById("envioVendedor").value) || 0;
let cotizacion = parseFloat(document.getElementById("cotizacion").value) || 1000;

// 🧮 valor declarado sumando cada producto
let valor = 0;

cart.forEach((item, i)=>{

let precio = parseFloat(document.getElementById(`precioDecl_${i}`).value) || 0;

valor += precio * item.cantidad;

});

// ➕ envío
valor += envioVendedor;

// 📦 correo
let costoCorreo = Math.floor(Math.random() * (8000 - 6000 + 1)) + 6000;

// 💰 impuestos
let excedente = valor > 50 ? (valor - 50) : 0;
let impuestoUSD = excedente * 0.5;

// 💱 conversión
let impuestoARS = impuestoUSD * cotizacion;

// 💵 total
let totalARS = impuestoARS + costoCorreo;

// 🧾 mostrar
document.getElementById("resultadoDeclaracion").innerText =
`Valor declarado total: $${valor} USD

Excedente: $${excedente} USD

Impuesto: $${impuestoUSD.toFixed(2)} USD
(${impuestoARS.toFixed(0)} ARS)

Correo argentino: $${costoCorreo} ARS

TOTAL FINAL: $${totalARS.toFixed(0)} ARS`;
}

function guardarPedido(){

let vendedor = document.getElementById("vendedor").value;
let cart = carritos[vendedor] || [];

if(cart.length === 0) return;

let historial = JSON.parse(localStorage.getItem("historialPedidos")) || [];

let fecha = new Date().toLocaleString();

// 🔥 CALCULAR ENVÍO EN ESE MOMENTO
let v = vendedores[vendedor];
let tipo = document.getElementById("tipoEnvio")?.value || "normal";

let totalItems = cart.reduce((a,b)=>a+b.cantidad,0);

let envio;
if(tipo==="ems" && v.ems){
envio = v.ems;
}else{
envio = v.env(totalItems);
}

// 🔥 CALCULAR TOTAL FINAL
let total = cart.reduce((a,b)=>a+b.precio,0) + envio;

// 🔥 GUARDAR TODO
historial.push({
fecha,
vendedor,
items: JSON.parse(JSON.stringify(cart)),
envio,
total
});

localStorage.setItem("historialPedidos", JSON.stringify(historial));

renderHistorial();
}

function renderHistorial(){

let cont = document.getElementById("historialContenido");
if(!cont) return;

let historial = JSON.parse(localStorage.getItem("historialPedidos")) || [];

cont.innerHTML = "";

// 🔥 BOTÓN VACIAR HISTORIAL
if(historial.length > 0){
cont.innerHTML += `
<button onclick="vaciarHistorial()"
style="margin-bottom:10px;background:#ef4444;color:white;padding:8px;border:none;border-radius:8px;cursor:pointer;width:100%;">
Vaciar historial
</button>
`;
}

historial.slice().reverse().forEach((pedido, i)=>{

let indexOriginal = historial.length - 1 - i;

let texto = `<div style="background:#f1f5f9;padding:10px;border-radius:8px;margin-bottom:10px;">
<b>${pedido.fecha}</b><br>
Vendedor: ${pedido.vendedor}<br><br>`;

// 🛒 ITEMS
pedido.items.forEach(item=>{
texto += `${item.cantidad}x ${nombres[item.producto]} - $${item.precio}<br>`;
});

// 🔥 ENVÍO (fallback para viejos)
let envio = pedido.envio ?? 0;

// 🔥 TOTAL (fallback para viejos)
let total = pedido.total ?? (pedido.items.reduce((a,b)=>a+b.precio,0) + envio);

// 📦 MOSTRAR
texto += `
<br>
Envío: $${envio}<br>
<b>Total: $${total}</b>
`;

// 🔁 BOTÓN
texto += `
<button onclick="repetirPedido(${indexOriginal})"
style="margin-top:8px;background:#2563eb;color:white;padding:6px 10px;border:none;border-radius:6px;cursor:pointer;width:100%;">
Repetir pedido
</button>

</div>`;

cont.innerHTML += texto;

});

}

function repetirPedido(index){

let historial = JSON.parse(localStorage.getItem("historialPedidos")) || [];

let pedido = historial[index]; // 🔥 FIX ACA

if(!pedido) return;

carritos[pedido.vendedor] = JSON.parse(JSON.stringify(pedido.items));

document.getElementById("vendedor").value = pedido.vendedor;
init();
cargarTodo();
render();
calcular();

alert("Pedido cargado nuevamente ✅");
}

function repetirUltimoPedido(){

let historial = JSON.parse(localStorage.getItem("historialPedidos")) || [];

if(historial.length === 0){
alert("No hay pedidos en el historial");
return;
}

let pedido = historial[historial.length - 1];

carritos[pedido.vendedor] = JSON.parse(JSON.stringify(pedido.items));

document.getElementById("vendedor").value = pedido.vendedor;

init();
cargarTodo();
render();
calcular();

alert("Último pedido cargado ✅");
}
function toggleHistorial(){
let panel = document.getElementById("panelHistorial");
panel.classList.toggle("activo");
}

function vaciarHistorial(){

let confirmar = confirm("¿Seguro querés borrar todo el historial?");
if(!confirmar) return;

localStorage.removeItem("historialPedidos");

renderHistorial();

}
document.addEventListener("click", function(e){

let panel = document.getElementById("panelHistorial");
let boton = document.getElementById("btnHistorial");

// si el panel está abierto
if(panel.classList.contains("activo")){

// si NO clickeaste ni el panel ni el botón → cerrar
if(!panel.contains(e.target) && !boton.contains(e.target)){
panel.classList.remove("activo");
}

}

});
</script>
