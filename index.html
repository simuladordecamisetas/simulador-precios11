<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador PRO</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.1);}
select,input,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;}
button{background:#007bff;color:white;border:none;cursor:pointer;}
li{background:#eee;margin:5px 0;padding:10px;border-radius:6px;}
.btn-eliminar{float:right;background:red;color:white;border:none;border-radius:4px;}
.total{font-size:22px;text-align:center;margin-top:10px;font-weight:bold;}
</style>
</head>

<body>

<div class="container">

<h2>Simulador de tu compra</h2>

<select id="pais" onchange="init()">
<option value="arg">Argentina</option>
<option value="col">Colombia</option>
<option value="per">Perú</option>
<option value="otro">Otro</option>
</select>

<select id="vendedor" onchange="cargarTodo()"></select>

<select id="producto"></select>

<input type="number" id="cantidad" value="1" min="1">

<div id="extras"></div>

<button onclick="agregar()">Agregar</button>

<h3>Carrito</h3>
<ul id="carrito"></ul>

<button onclick="vaciar()">Vaciar carrito</button>

<div class="total" id="total"></div>

</div>

<script>

let nombres={
fan:"Fan",playerNike:"Player Nike",playerAdidas:"Player Adidas",playerPuma:"Player Puma",
retro:"Retro",nba:"NBA",nfl:"NFL",
shortsFan:"Short Fan",shortsPlayer:"Short Player",shorts:"Short",
medias:"Medias",mediasNinos:"Medias Niño",mediasAdultos:"Medias Adulto",
kitInfantil:"Kit Infantil",kitAdulto:"Kit Adulto",
entrenamiento:"Entrenamiento",jacket:"Campera",pants:"Pantalón",
jacketPants:"Conjunto",rompevientos:"Rompevientos"
};

let vendedores={

king:{
disp:["col","per","otro"],
prod:{otro:{fan:11,playerAdidas:14,playerNike:15,retro:15,nba:20,kitInfantil:13,shorts:9,medias:4}},
ext:{parche:1,personalizacion:3,cuello:1,manga:1,talle2XL:1},
env:c=>c==1?5:c==2?4:c==3?3:0
},

huang:{
disp:["arg","col","per","otro"],
prod:{
arg:{fan:13,playerAdidas:16,playerNike:18,retro:20,nba:22,kitInfantil:13,shortsFan:11,shortsPlayer:15,medias:6,entrenamiento:50,jacketPants:40,pants:20},
otro:{fan:11,playerAdidas:14,playerNike:16,retro:16,nba:20,kitInfantil:13,shortsFan:9,shortsPlayer:13,medias:5,entrenamiento:35,jacketPants:38,pants:18}
},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:2,talle4XL:3},
env:c=>c==1?4:c==2?3:c==3?2:0
},

meiou:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:13,playerPuma:14,playerNike:15,retro:15,nba:20,nfl:25,kitInfantil:13,shortsFan:10,shortsPlayer:13,medias:8,jacket:40,entrenamiento:35,rompevientos:32}},
ext:{parche:1,personalizacion:3,manga:1,talle3XL:1,talle4XL:2},
env:c=>c<=2?10:c<=4?8:6
},

pinhui:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:13,playerNike:17,retro:17,nba:20,nfl:25,kitInfantil:14,shortsFan:10,shortsPlayer:15,medias:8,entrenamiento:40,jacket:30,kitCompleto:20}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:2,talle4XL:3},
env:c=>c>=5?0:5
},

annie:{
disp:["arg","col","per","otro"],
prod:{arg:{fan:12,player:18,retro:18,nba:22,kitInfantil:14,kitAdulto:22,shorts:12,manga:16},otro:{fan:11,player:15,retro:16}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:2,talle4XL:2},
env:c=>10
},

bond:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:14,playerNike:15,retro:16,kitInfantil:13,shortsFan:8,shortsPlayer:12,medias:3,entrenamiento:35,kitCompleto:19,jacketPants:38,pants:18}},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:1,talle4XL:1},
env:c=>c==1?7:c<=4?5:0
},

jerry:{
disp:["col","per","otro"],
prod:{otro:{fan:11,player:15,retro:16,nba:20,kitInfantil:13}},
ext:{parche:1,personalizacion:3},
env:c=>c>=3?0:5
},

xiaoli:{
disp:["arg","col","per","otro"],
prod:{
arg:{fan:13,playerAdidas:16,playerNike:17,retro:18,nba:22,nfl:25,kitInfantil:15,kitAdulto:21,shortsFan:10,shortsPlayer:14,mediasNinos:3,mediasAdultos:4,entrenamiento:37,jacket:30,pants:19,jacketPants:42},
otro:{fan:11,playerAdidas:14,playerNike:16,retro:15,nba:20}
},
ext:{parche:1,personalizacion:3,talle2XL:1,talle3XL:1,talle4XL:1},
env:c=>c==2?11:c==3?9:c==4?7:0
},

meiting:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerNike:15,retro:15,nba:20,nfl:25,kitInfantil:13,shortsFan:10,shortsPlayer:13,medias:8,jacket:40,entrenamiento:35}},
ext:{parche:1,personalizacion:3,manga:1,talle3XL:1,talle4XL:2},
env:c=>c<=2?10:c<=4?8:6
},

mai:{
disp:["arg","col","per","otro"],
prod:{otro:{fan:11,playerAdidas:14,playerNike:15,retro:16,nba:20,nfl:23,kitInfantil:13,kitAdulto:19,shortsFan:8,shortsPlayer:12,shorts:14,mediasNinos:2,mediasAdultos:3,entrenamiento:35,jacket:28,pants:17,jacketPants:38}},
ext:{parche:1,personalizacion:3,talle:1},
env:c=>5
}

};

let carritos={};

function init(){
let pais=document.getElementById("pais").value;
let sel=document.getElementById("vendedor");
sel.innerHTML="";

for(let v in vendedores){
if(vendedores[v].disp.includes(pais)){
let op=document.createElement("option");
op.value=v;
op.textContent=v.toUpperCase();
sel.appendChild(op);
}}
cargarTodo();
}

function cargarTodo(){
let pais=document.getElementById("pais").value;
let vendedor=document.getElementById("vendedor").value;
let v=vendedores[vendedor];

let productos=v.prod[pais]||v.prod.otro;

let prodSel=document.getElementById("producto");
prodSel.innerHTML="";

for(let p in productos){
let op=document.createElement("option");
op.value=p;
op.textContent=(nombres[p]||p)+" ($"+productos[p]+")";
prodSel.appendChild(op);
}

let extras=document.getElementById("extras");
extras.innerHTML="";

for(let e in v.ext){
let c=document.createElement("input");
c.type="checkbox";
c.value=e;

extras.appendChild(c);
extras.append(" "+e+" (+$"+v.ext[e]+")");
extras.appendChild(document.createElement("br"));
}

render();
}

function agregar(){
let pais=document.getElementById("pais").value;
let vendedor=document.getElementById("vendedor").value;
let producto=document.getElementById("producto").value;
let cantidad=parseInt(document.getElementById("cantidad").value)||1;

if(!carritos[vendedor]) carritos[vendedor]=[];

let v=vendedores[vendedor];
let productos=v.prod[pais]||v.prod.otro;

let base=productos[producto];
let extrasSel=[];
let extraTotal=0;

document.querySelectorAll("#extras input:checked").forEach(c=>{
extrasSel.push(c.value);
extraTotal+=v.ext[c.value];
});

let precio=(base+extraTotal)*cantidad;

carritos[vendedor].push({producto,extras:extrasSel,cantidad,precio});

render();
calcular();
}

function render(){
let vendedor=document.getElementById("vendedor").value;
let ul=document.getElementById("carrito");
ul.innerHTML="";

let cart=carritos[vendedor]||[];

cart.forEach((item,index)=>{
let nombre=nombres[item.producto]||item.producto;
let extras=item.extras.length?(" + "+item.extras.join(", ")):"";

let li=document.createElement("li");

li.innerHTML=`
${item.cantidad}x ${nombre}${extras} - $${item.precio}
<button class="btn-eliminar" onclick="eliminar(${index})">X</button>
`;

ul.appendChild(li);
});
}

function eliminar(index){
let vendedor=document.getElementById("vendedor").value;
carritos[vendedor].splice(index,1);
render();
calcular();
}

function vaciar(){
let vendedor=document.getElementById("vendedor").value;
carritos[vendedor]=[];
render();
calcular();
}

function calcular(){
let vendedor=document.getElementById("vendedor").value;
let v=vendedores[vendedor];

let cart=carritos[vendedor]||[];

let totalItems = cart.reduce((acc,item)=>acc + item.cantidad,0);
let subtotal=cart.reduce((a,b)=>a+b.precio,0);
let envio=v.env ? v.env(totalItems) : 0;

document.getElementById("total").innerText=
"TOTAL: $" + (subtotal+envio) + " ("+totalItems+" productos - envío $" + envio + ")";
}

init();

</script>

</body>
</html>
